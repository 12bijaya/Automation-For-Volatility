<svg width="1500" height="600" viewBox="0 0 1500 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Plain White Background -->
  <rect width="1500" height="600" fill="#ffffff" />
  
  <!-- Header -->
  <text x="750" y="50" font-family="Segoe UI, Inter, sans-serif" font-size="28" font-weight="bold" fill="#005a9e" text-anchor="middle">Tech Stack &amp; Common Technologies</text>
  
  <g transform="translate(300, 100)">
    
    <!-- Python Box -->
    <rect x="0" y="0" width="280" height="220" rx="10" fill="none" stroke="#005a9e" stroke-width="1.2" />
    <!-- Ultra-High Fidelity Python Logo -->
    <g transform="translate(90, 20) scale(1.1)">
      <!-- Blue Snake -->
      <path d="M 50,0 C 23,0 24.5,12 24.5,12 L 24.5,24.5 L 50.5,24.5 L 50.5,28 L 7,28 C 7,28 0,27 0,54 C 0,81 6.5,80 6.5,80 L 16.5,80 L 16.5,67 C 16.5,67 16,52 31,52 L 56,52 C 56,52 70,52 70,39 L 70,14.5 C 70,14.5 71,0 50,0 z" fill="#3776ab" />
      <circle cx="37" cy="8" r="4.5" fill="#ffffff" />
      
      <!-- Yellow Snake -->
      <g transform="translate(100.5, 107.5) rotate(180)">
        <path d="M 50,0 C 23,0 24.5,12 24.5,12 L 24.5,24.5 L 50.5,24.5 L 50.5,28 L 7,28 C 7,28 0,27 0,54 C 0,81 6.5,80 6.5,80 L 16.5,80 L 16.5,67 C 16.5,67 16,52 31,52 L 56,52 C 56,52 70,52 70,39 L 70,14.5 C 70,14.5 71,0 50,0 z" fill="#ffd343" />
        <circle cx="37" cy="8" r="4.5" fill="#ffffff" />
      </g>
    </g>
    <text x="140" y="180" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Python</text>
    <text x="140" y="200" font-family="Segoe UI, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Language &amp; Automation</text>

    <!-- Tkinter Box -->
    <rect x="310" y="0" width="280" height="220" rx="10" fill="none" stroke="#005a9e" stroke-width="1.2" />
    <!-- Tkinter Feather -->
    <path d="M 450 145 C 430 115, 420 85, 450 45 C 480 85, 470 115, 450 145 Z" fill="none" stroke="#217346" stroke-width="1.5" />
    <path d="M 450 45 L 450 145" stroke="#217346" stroke-width="1.2" />
    <path d="M 442 70 L 458 70 M 438 90 L 462 90 M 442 110 L 458 110" stroke="#217346" stroke-width="0.8" />
    <text x="450" y="180" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Tkinter</text>
    <text x="450" y="200" font-family="Segoe UI, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Desktop GUI</text>

    <!-- Volatility 3 Box -->
    <rect x="620" y="0" width="280" height="220" rx="10" fill="none" stroke="#005a9e" stroke-width="1.2" />
    <!-- Perfected Volatility Logo -->
    <g transform="translate(710, 30)">
      <path d="M 36 14 A 40 40 0 1 0 64 14" fill="none" stroke="#1a1a1b" stroke-width="9" />
      <path d="M 50 0 L 50 35" stroke="#1a1a1b" stroke-width="10" stroke-linecap="butt" />
      <path d="M 20 50 L 30 50 L 36 38 L 44 68 L 56 18 L 64 82 L 70 50 L 80 50" fill="none" stroke="#ed1c24" stroke-width="4.5" stroke-linejoin="round" />
    </g>
    <text x="760" y="180" font-family="Verdana, Geneva, sans-serif" font-size="20" font-weight="bold" fill="#ed1c24" text-anchor="middle" letter-spacing="0.5">VOLATILITY</text>
    <text x="760" y="200" font-family="Segoe UI, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Forensic Framework</text>

    <!-- Persistence Box -->
    <rect x="150" y="260" width="280" height="180" rx="10" fill="none" stroke="#005a9e" stroke-width="1.2" />
    <text x="290" y="325" font-family="Consolas, monospace" font-size="32" font-weight="bold" fill="#005a9e" text-anchor="middle">{ JSON }</text>
    <text x="290" y="380" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Persistence</text>
    <text x="290" y="405" font-family="Segoe UI, sans-serif" font-size="12" fill="#666666" text-anchor="middle">JSON, CSV &amp; MD</text>

    <!-- Interaction Box -->
    <rect x="470" y="260" width="280" height="180" rx="10" fill="none" stroke="#005a9e" stroke-width="1.2" />
    <rect x="560" y="295" width="100" height="40" rx="4" fill="#333333" />
    <text x="610" y="320" font-family="Consolas, monospace" font-size="12" fill="#ffffff" text-anchor="middle">vol -f image</text>
    <text x="610" y="380" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Interaction</text>
    <text x="610" y="405" font-family="Segoe UI, sans-serif" font-size="12" fill="#666666" text-anchor="middle">OS Subprocesses</text>

