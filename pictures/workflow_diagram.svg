<svg width="1500" height="850" viewBox="0 0 1500 850" xmlns="http://www.w3.org/2000/svg">
  <!-- Plain White Background -->
  <rect width="1500" height="850" fill="#ffffff" />
  
  <!-- Header -->
  <text x="750" y="50" font-family="Segoe UI, Inter, sans-serif" font-size="28" font-weight="bold" fill="#005a9e" text-anchor="middle">Volatility³ Assistant Workflow</text>
  
  <!-- Definitions for Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333" />
    </marker>
  </defs>

  <!-- Content Group to center -->
  <g transform="translate(150, 0)">
    <!-- Step 1: Load Image -->
    <rect x="0" y="120" width="220" height="80" rx="10" fill="#f3f3f3" stroke="#005a9e" stroke-width="1.2" />
    <text x="110" y="155" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">1. Load Memory Image</text>
    <text x="110" y="175" font-family="Segoe UI, sans-serif" font-size="12" fill="#666666" text-anchor="middle">(.raw, .mem, .vmem, .img)</text>

    <!-- Arrow 1 to 2 -->
    <line x1="220" y1="160" x2="300" y2="160" stroke="#333333" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <!-- Step 2: Init & Setup -->
    <rect x="310" y="120" width="220" height="80" rx="10" fill="#f3f3f3" stroke="#005a9e" stroke-width="1.2" />
    <text x="420" y="155" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">2. Environment Setup</text>
    <text x="420" y="175" font-family="Segoe UI, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Create output dir &amp; symbols path</text>

    <!-- Arrow 2 to 3 -->
    <line x1="530" y1="160" x2="610" y2="160" stroke="#333333" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <!-- Step 3: OS Detection -->
    <rect x="620" y="120" width="220" height="80" rx="10" fill="#f3f3f3" stroke="#005a9e" stroke-width="1.2" />
    <text x="730" y="155" font-family="Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">3. OS Context Detection</text>
    <text x="730" y="175" font-family="Segoe UI, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Auto-detect or Manual Override</text>

    <!-- vertical Arrow 3 down to split -->
    <line x1="730" y1="200" x2="730" y2="255" stroke="#333333" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <!-- Analysis Strategy Split -->
    <rect x="310" y="270" width="600" height="150" rx="15" fill="#fafafa" stroke="#cccccc" stroke-dasharray="4,4" />
    <text x="330" y="300" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#005a9e">4. Select Analysis Strategy</text>

    <!-- Strategy A: Quick Analysis -->
    <rect x="330" y="320" width="170" height="80" rx="8" fill="#ffffff" stroke="#005a9e" stroke-width="1" />
    <text x="415" y="355" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Quick Analysis</text>
    <text x="415" y="375" font-family="Segoe UI, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Essential (pslist, netscan)</text>

    <!-- Strategy B: Full Auto -->
    <rect x="525" y="320" width="170" height="80" rx="8" fill="#ffffff" stroke="#005a9e" stroke-width="1" />
    <text x="610" y="355" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Full-Auto Scan</text>
    <text x="610" y="375" font-family="Segoe UI, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Full Forensic Suite</text>

    <!-- Strategy C: Manual -->
    <rect x="720" y="320" width="170" height="80" rx="8" fill="#ffffff" stroke="#005a9e" stroke-width="1" />
    <text x="805" y="355" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Manual Plugin</text>
    <text x="805" y="375" font-family="Segoe UI, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Targeted Plugin Analysis</text>

    <!-- Arrow down from strategy to Execution -->
    <line x1="610" y1="420" x2="610" y2="465" stroke="#333333" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <!-- Step 5: Execution Engine -->
    <rect x="480" y="480" width="260" height="100" rx="10" fill="#f9f9f9" stroke="#005a9e" stroke-width="2" />
    <text x="610" y="520" font-family="Consolas, monospace" font-size="18" font-weight="bold" fill="#008000" text-anchor="middle">Volatility³ Engine</text>
    <text x="610" y="545" font-family="Segoe UI, sans-serif" font-size="13" fill="#333333" text-anchor="middle">Mapping Legacy → V3 Plugins</text>
    <text x="610" y="565" font-family="Segoe UI, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Subprocess execution in threads</text>

    <!-- Arrow to Result Processing -->
    <line x1="610" y1="580" x2="610" y2="625" stroke="#333333" stroke-width="1.5" marker-end="url(#arrowhead)" />

    <!-- Step 6: Results & Display -->
    <rect x="310" y="640" width="600" height="120" rx="12" fill="#fafafa" stroke="#cccccc" stroke-width="1.2" />
    
    <!-- Sub-box Result A -->
    <rect x="330" y="660" width="170" height="80" rx="8" fill="#ffffff" stroke="#008000" stroke-width="1" />
    <text x="415" y="695" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Table View</text>
    <text x="415" y="715" font-family="Segoe UI, sans-serif" font-size="11" fill="#666666" text-anchor="middle">JSON Data Rendering</text>

    <!-- Sub-box Result B -->
    <rect x="525" y="660" width="170" height="80" rx="8" fill="#ffffff" stroke="#005a9e" stroke-width="1" />
    <text x="610" y="695" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Persistence</text>
    <text x="610" y="715" font-family="Segoe UI, sans-serif" font-size="11" fill="#666666" text-anchor="middle">Raw Outputs &amp; CSV</text>

    <!-- Sub-box Result C -->
    <rect x="720" y="660" width="170" height="80" rx="8" fill="#ffffff" stroke="#b8860b" stroke-width="1" />
    <text x="805" y="695" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#333333" text-anchor="middle">Report Gen</text>
    <text x="805" y="715" font-family="Segoe UI, sans-serif" font-size="11" fill="#666666" text-anchor="middle">FORENSIC_REPORT.md</text>
  </g>

</svg>
